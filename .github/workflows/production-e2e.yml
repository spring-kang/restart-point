name: Production E2E Smoke

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  production-smoke:
    name: User/Admin production smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production smoke tests
        env:
          E2E_TARGET: production
          USER_BASE_URL: https://restart-point.com
          ADMIN_BASE_URL: https://admin.restart-point.com
          USER_TEST_EMAIL: ${{ secrets.USER_TEST_EMAIL }}
          USER_TEST_PASSWORD: ${{ secrets.USER_TEST_PASSWORD }}
          ADMIN_TEST_EMAIL: ${{ secrets.ADMIN_TEST_EMAIL }}
          ADMIN_TEST_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}
        run: npm run test:e2e -- production.smoke.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-e2e-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
