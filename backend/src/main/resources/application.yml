spring:
  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:restartpoint
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

server:
  port: 8080

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: restart-point-jwt-secret-key-for-development-environment-2024
  expiration: 86400000  # 24시간

# 이메일 인증 설정
email:
  verification:
    expiration-minutes: 10
    signup-window-minutes: 30

# Resend 설정
resend:
  api-key: ${RESEND_API_KEY:re_test}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Groq AI 설정 (무료 오픈소스 LLM)
groq:
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.1-70b-versatile}
  max-tokens: ${GROQ_MAX_TOKENS:4096}

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:restartpoint}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:restart-point-jwt-secret-key-for-production}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS 설정
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://restart-point.com,http://localhost:5173}
