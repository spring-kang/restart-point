spring:
  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:restartpoint
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

server:
  port: 8080

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: restart-point-jwt-secret-key-for-development-environment-2024
  expiration: 86400000  # 24시간

# 이메일 인증 설정
email:
  verification:
    expiration-minutes: 10
    signup-window-minutes: 30

# Resend 설정
resend:
  api-key: ${RESEND_API_KEY:re_test}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Groq AI 설정 (무료 오픈소스 LLM)
groq:
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.1-70b-versatile}
  max-tokens: ${GROQ_MAX_TOKENS:4096}

# AWS S3 설정
aws:
  s3:
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_S3_REGION:ap-northeast-2}

# 파일 업로드 설정
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

# Swagger 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 앱 설정
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  test-data:
    enabled: ${APP_TEST_DATA_ENABLED:false}

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:restartpoint}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:restart-point-jwt-secret-key-for-production}
  expiration: ${JWT_EXPIRATION:86400000}

# 앱 설정
app:
  base-url: ${APP_BASE_URL:https://restart-point-backend-production.up.railway.app}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://restart-point.com,http://localhost:5173}
  test-data:
    enabled: ${APP_TEST_DATA_ENABLED:false}
